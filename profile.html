<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faceless Creator Studio | Profile</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="profile">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="page-shell fade-in-up profile-layout">
      <section class="glass-card">
        <h1>Profile</h1>
        <div class="form-group">
          <label for="profileUsername">Username</label>
          <input id="profileUsername" type="text" />
        </div>

        <div class="form-group">
          <label for="profilePassword">Password</label>
          <input id="profilePassword" type="text" />
        </div>

        <div class="button-row">
          <button id="saveProfileBtn" class="btn glow">Update Profile</button>
          <a class="btn" href="dashboard.html">Back to Dashboard</a>
        </div>
      </section>

      <section class="glass-card">
        <h2>Saved Elements</h2>
        <ul id="savedList" class="saved-list"></ul>
      </section>
    </main>

    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
  </body>
</html>
