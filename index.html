<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faceless Creator Studio | Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="auth">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="center-layout">
      <section class="glass-card auth-card fade-in-up">
        <h1>Faceless Creator Studio</h1>
        <p class="subtitle">Build anonymous content systems with style.</p>

        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="Enter username" autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
        </div>

        <div class="button-row">
          <button id="signupBtn" class="btn glow">Signup</button>
          <button id="loginBtn" class="btn">Login</button>
        </div>

        <p id="authStatus" class="status-text"></p>
      </section>
    </main>

    <div id="loader" class="loader-overlay hidden">
      <div class="loader"></div>
      <p>Loading your studio...</p>
    </div>

    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
  </body>
</html>
